<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mini Apps for Student Productivity Hub">
    <title>Apps | Student Productivity Hub</title>

    <meta name="keywords" content="student, productivity, hub, study, planner">
    <meta name="author" content="StudyHub Team">
    <meta property="og:title" content="Student Productivity Hub">
    <meta property="og:description" content="The ultimate student productivity hub designed to help you organize, focus, and achieve your goals.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="ui.js" defer></script>
    <script src="api.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">StudyHub</a>
            <div class="nav-right">
                <button class="hamburger" aria-label="Toggle Menu">
                    <span></span><span></span><span></span>
                </button>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="apps.html">Apps</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
            </div>
        </nav>
    </header>

    <main>
        <h1 style="text-align: center; margin-bottom: 3rem;">Mini Applications</h1>
        
        <div class="apps-container">
            <!-- Weather App -->
            <div class="app-card" id="weather-app">
                <h2>Weather App</h2>
                <div class="app-input-group">
                    <input type="text" id="city-input" placeholder="Enter city name...">
                    <button id="search-weather-btn" class="btn">Search</button>
                </div>
                <div id="weather-error" class="error-msg"></div>
                <div id="weather-result" class="weather-result" style="display: none;">
                    <h3 id="weather-city"></h3>
                    <div class="weather-main">
                        <img loading="lazy" id="weather-icon" src="" alt="Weather icon">
                        <span id="weather-temp"></span>
                    </div>
                    <div class="weather-details">
                        <p>Humidity: <span id="weather-humidity"></span></p>
                        <p>Wind Speed: <span id="weather-wind"></span></p>
                    </div>
                </div>
            </div>

            <!-- Todo List App -->
            <div class="app-card" id="todo-app">
                <h2>Todo List</h2>
                <form id="todo-form" class="app-input-group">
                    <input type="text" id="todo-input" placeholder="Add a new task..." required>
                    <button type="submit" class="btn">Add</button>
                </form>
                <div class="todo-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <ul id="todo-list" class="todo-list"></ul>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Student Productivity Hub. All rights reserved.</p>
    </footer>
</body>
</html>
